name: Publish on Tag

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag ${{ github.ref_name }} does not match vX.Y.Z format"
            exit 1
          fi
          echo "Tag ${{ github.ref_name }} is valid semver"

      - name: Sync version from tag to pom.xml
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          VERSION="${TAG_VERSION#v}"
          echo "Setting <version>${VERSION}</version> in pom.xml"
          sed -i "0,/<version>[^<]*<\/version>/s//<version>${VERSION}<\/version>/" pom.xml
          head -30 pom.xml

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main
        with:
          java-version: '25'
          build-tool: maven
          # NOVA_RELEASE_PAT is a Personal Access Token with packages:read
          # across the org (GITHUB_TOKEN can only read packages from its
          # OWN repo, which fails during parent-pom deploy when resolving
          # cross-repo dependencies like nova-notifications-quarkus-extension).
          packages-read-token: ${{ secrets.NOVA_RELEASE_PAT || secrets.NOVA_PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Append github server to settings.xml for deployment
        # setup-java configures nova-packages-read-bom / nova-packages-read-starter
        # servers (for resolving cross-repo dependencies). Maven deployment
        # still needs a separate "github" server (server id matched against the
        # <distributionManagement><repository><id> in the POM). We append it
        # here WITHOUT overwriting setup-java's cross-repo credentials.
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat >> ~/.m2/settings.xml <<EOF
              <server>
                <id>github</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>
          EOF
          echo "settings.xml now has 3 servers: nova-packages-read-bom, nova-packages-read-starter, github"

      - name: Publish to GitHub Packages
        run: mvn deploy -DskipTests --no-transfer-progress