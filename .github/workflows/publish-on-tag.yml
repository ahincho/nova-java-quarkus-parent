name: Publish on Tag

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag ${{ github.ref_name }} does not match vX.Y.Z format"
            exit 1
          fi
          echo "Tag ${{ github.ref_name }} is valid semver"

      - name: Sync version from tag to pom.xml
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          VERSION="${TAG_VERSION#v}"
          echo "Setting <version>${VERSION}</version> in pom.xml"
          sed -i "0,/<version>[^<]*<\/version>/s//<version>${VERSION}<\/version>/" pom.xml
          head -30 pom.xml

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main
        with:
          java-version: '25'
          build-tool: maven
          # NOVA_RELEASE_PAT is a Personal Access Token with packages:read
          # across the org (GITHUB_TOKEN can only read packages from its
          # OWN repo, which fails during parent-pom deploy when resolving
          # cross-repo dependencies like nova-notifications-quarkus-extension).
          packages-read-token: ${{ secrets.NOVA_RELEASE_PAT || secrets.NOVA_PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Rewrite settings.xml with all 3 servers
        # setup-java configures only the cross-repo READ servers
        # (nova-packages-read-bom, nova-packages-read-starter). Maven deployment
        # still needs a separate "github" server (server id matched against the
        # <distributionManagement><repository><id> in the POM). We rewrite the
        # whole settings.xml here with all three servers to avoid XML malformation
        # from appending outside the </servers> block.
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EFFECTIVE_READ_TOKEN: ${{ secrets.NOVA_RELEASE_PAT || secrets.NOVA_PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>nova-packages-read-bom</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${EFFECTIVE_READ_TOKEN}</password>
              </server>
              <server>
                <id>nova-packages-read-starter</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${EFFECTIVE_READ_TOKEN}</password>
              </server>
              <server>
                <id>github</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
          echo "settings.xml rewritten with 3 servers: nova-packages-read-bom, nova-packages-read-starter, github"

      - name: Publish to GitHub Packages
        run: mvn deploy -DskipTests --no-transfer-progress